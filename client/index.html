<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlacementPortal | Connecting Careers</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="description" content="PlacementPortal - Connecting students with their dream careers. Find internships and jobs from top companies." />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      /* ── App Splash Screen ── shown before React mounts ── */
      #app-splash {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0f0c29 0%, #1a1a4e 50%, #0f0c29 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        z-index: 99999;
        animation: splash-fadein 0.4s ease;
      }
      @keyframes splash-fadein {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .splash-logo-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.2rem;
      }
      .splash-rings {
        position: relative;
        width: 80px;
        height: 80px;
      }
      .splash-rings::before,
      .splash-rings::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid transparent;
      }
      .splash-rings::before {
        border-top-color: #6366f1;
        border-right-color: #6366f1;
        animation: splash-spin 1s linear infinite;
      }
      .splash-rings::after {
        border-bottom-color: #a78bfa;
        border-left-color: #a78bfa;
        inset: 12px;
        animation: splash-spin 0.7s linear infinite reverse;
      }
      .splash-core {
        position: absolute;
        inset: 24px;
        background: radial-gradient(circle, #6366f1, #4f46e5);
        border-radius: 50%;
        box-shadow: 0 0 20px rgba(99,102,241,0.7);
        animation: splash-pulse 1.5s ease-in-out infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(99,102,241,0.6); }
        50%       { transform: scale(1.15); box-shadow: 0 0 30px rgba(99,102,241,0.9); }
      }
      .splash-title {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(90deg, #818cf8, #c4b5fd, #818cf8);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: splash-shimmer 2s linear infinite;
        letter-spacing: 0.05em;
      }
      .splash-subtitle {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 0.8rem;
        color: rgba(255,255,255,0.4);
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      @keyframes splash-shimmer {
        to { background-position: 200% center; }
      }
      .splash-progress-track {
        width: 180px;
        height: 3px;
        background: rgba(255,255,255,0.08);
        border-radius: 99px;
        overflow: hidden;
      }
      .splash-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #6366f1, #a78bfa, #6366f1);
        background-size: 200% auto;
        border-radius: 99px;
        animation: splash-progress 1.8s ease-in-out infinite;
      }
      @keyframes splash-progress {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-splash">
        <div class="splash-logo-wrap">
          <div class="splash-rings">
            <div class="splash-core"></div>
          </div>
          <div class="splash-title">PlacementPortal</div>
          <div class="splash-subtitle">Connecting Careers</div>
        </div>
        <div class="splash-progress-track">
          <div class="splash-progress-fill"></div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
