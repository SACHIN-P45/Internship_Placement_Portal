<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlacementPortal | Connecting Careers</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="description" content="PlacementPortal - Connecting students with their dream careers. Find internships and jobs from top companies." />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      /* ── App Splash Screen ── shown before React mounts ── */
      #app-splash {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0a1628 0%, #0d2137 40%, #061520 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        z-index: 99999;
        animation: splash-fadein 0.4s ease;
      }
      @keyframes splash-fadein {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .splash-orbit-wrapper {
        position: relative;
        width: 140px;
        height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .splash-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
      }
      .splash-ring-1 {
        border-top-color: rgba(6, 182, 212, 0.8);
        border-right-color: rgba(6, 182, 212, 0.4);
        animation: splash-spin 2.4s linear infinite;
      }
      .splash-ring-2 {
        inset: 10px;
        border-bottom-color: rgba(59, 130, 246, 0.9);
        border-left-color: rgba(59, 130, 246, 0.4);
        animation: splash-spin 1.8s linear infinite reverse;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      .splash-logo-container {
        position: relative;
        z-index: 2;
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .splash-logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
        position: relative;
        z-index: 3;
        animation: splash-pulse 3s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); }
        50%       { transform: scale(1.06); }
      }
      .splash-brand {
        display: flex;
        align-items: baseline;
        gap: 0;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .splash-brand-1 {
        background: linear-gradient(135deg, #06b6d4, #3b82f6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .splash-brand-2 {
        background: linear-gradient(135deg, #10b981, #059669);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .splash-subtitle {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 0.7rem;
        color: rgba(255,255,255,0.35);
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin-top: -1rem;
      }
      .splash-progress-track {
        width: 180px;
        height: 3px;
        background: rgba(255,255,255,0.08);
        border-radius: 99px;
        overflow: hidden;
      }
      .splash-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #06b6d4, #3b82f6, #10b981);
        background-size: 200% auto;
        border-radius: 99px;
        animation: splash-progress 1.6s ease-in-out infinite;
      }
      @keyframes splash-progress {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-splash">
        <div class="splash-orbit-wrapper">
          <div class="splash-ring splash-ring-1"></div>
          <div class="splash-ring splash-ring-2"></div>
          <div class="splash-logo-container">
            <img src="/logo.png" alt="PlacementPortal" class="splash-logo" />
          </div>
        </div>
        <div class="splash-brand">
          <span class="splash-brand-1">Placement</span>
          <span class="splash-brand-2">Portal</span>
        </div>
        <div class="splash-subtitle">CONNECTING CAREERS</div>
        <div class="splash-progress-track">
          <div class="splash-progress-fill"></div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
